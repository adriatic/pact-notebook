<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="{{css}}" />
  </head>

  <body>
    <h2>PACT Control</h2>

    <div id="notebook">-</div>

    <table>
      <tr>
        <td><b>Cell</b></td>

        <td id="cell">1 / 1</td>

        <td style="text-align: right">
          <button id="prev">←</button>
          <button id="next">→</button>
        </td>
      </tr>

      <tr>
        <td colspan="3" style="padding-top: 10px; text-align: right">
          <button id="create">Create Prompt</button>
          <button id="run">Run Prompt</button>
        </td>
      </tr>

      <tr>
        <td span id="led" class="led green"></td>
          <span id="statusLabel">Idle</span>
        </td>
      </tr>
    </table>

    <script src="{{js}}"></script>
  </body>
</html>
