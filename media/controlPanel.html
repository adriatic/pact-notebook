<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{{css}}" />
</head>

<body>

  <div class="panel">

    <div class="title">PACT Control</div>

    <div class="navigator">

      <span id="cellLabel">Cell 1 / 1</span>

      <div class="navButtons">
        <button id="prevCell">←</button>
        <button id="nextCell">→</button>
      </div>

    </div>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>

    <div class="buttons">
      <button id="runCell">Run Cell</button>
      <button id="runAll">Run All</button>
      <button id="clearOutput">Clear Output</button>
      <button id="showLedger">Ledger</button>
    </div>

  </div>

  <script src="{{js}}"></script>

</body>

</html>
